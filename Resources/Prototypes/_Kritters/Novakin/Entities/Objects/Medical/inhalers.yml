- type: entity
  abstract: true
  parent: BaseItem
  id: BaseNovakinInhaler
  name: Novakin reserve inhaler
  description: A refillable pressure vessel that replenishes a Novakin's gaseous body.
  components:
  - type: Sprite
    sprite: Objects/Tanks/emergency.rsi
    state: icon
  - type: Item
    size: Small
    sprite: Objects/Tanks/emergency.rsi
  - type: Tag
    tags:
    - GasTank
  - type: GasTank
    outputPressure: 21.3
    air:
      volume: 0.66
      temperature: 293.15
    tankLowPressure: 0
  - type: NovakinInhaler
    gas: NovakinGasNitrogen
    reservePerMole: 400
    transferAmount: 25
  - type: UseDelay
    delay: 1

- type: entity
  parent: BaseNovakinInhaler
  id: NovakinInhalerAdaptive
  name: adaptive Novakin inhaler
  suffix: Starting kit
  components:
  - type: NovakinInhaler
    gas: NovakinGasNitrogen
    adaptToOwnerGas: true
  - type: GasTank
    air:
      volume: 0.66
      moles: [0, 0.270782035]
      temperature: 293.15

