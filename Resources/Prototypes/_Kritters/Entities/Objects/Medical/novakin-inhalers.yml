- type: entity
  abstract: true
  parent: BaseItem
  id: BaseNovakinInhaler
  name: Novakin reserve inhaler
  description: A refillable pressure vessel that replenishes a Novakin's gaseous body.
  components:
  - type: Sprite
    sprite: Objects/Tanks/emergency.rsi
    state: icon
  - type: Item
    size: Small
    sprite: Objects/Tanks/emergency.rsi
  - type: Tag
    tags:
    - GasTank
  - type: GasTank
    outputPressure: 21.3
    air:
      volume: 0.66
      temperature: 293.15
    tankLowPressure: 0
  - type: NovakinInhaler
    maxMoles: 0.125
    reservePerMole: 400
    transferAmount: 10
  - type: UseDelay
    delay: 1

- type: entity
  parent: BaseNovakinInhaler
  id: NovakinInhalerNitrogen
  name: nitrogen Novakin inhaler
  suffix: Filled
  components:
  - type: NovakinInhaler
  - type: GasTank
    air:
      volume: 0.66
      moles: [0, 0.125]
      temperature: 293.15
