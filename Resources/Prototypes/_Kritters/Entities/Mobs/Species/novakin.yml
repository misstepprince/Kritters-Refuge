- type: entity
  save: false
  name: Urist McNova
  parent: BaseMobSpecies
  id: BaseMobNovakin
  abstract: true
  components:
  - type: Inventory
    speciesId: novakin
  - type: HumanoidAppearance
    species: Novakin
  - type: Icon
    sprite: _Kritters/Mobs/Species/Novakin/parts.rsi
    state: full
  - type: Body
    prototype: Novakin
    requiredLegs: 2
  # Reagents are processed by the Core's stomach, not a body bloodstream.
  - type: SolutionContainerManager
    solutions:
      chemicals:
        maxVol: 100
  - type: Needs
    needs:
    - NeedNovakinFuel
  - type: NovakinPhysiology
    fuelConsumptionBaselineTemperature: 373.15
    maximumHeatSpeedMultiplier: 1.15
    maximumHeatSpeedTemperature: 699
    reserveDrainPerSecond: 0.055555556
    leakedMolesPerReserve: 0.01
  - type: Speech
    speechVerb: Novakin
    speechSounds: Novakin
    allowedEmotes: [Marr, Wurble, Hiss, Growl, Purr]
  - type: Vocal
    sounds:
      Male: MaleNovakin
      Female: FemaleNovakin
      Unsexed: MaleNovakin
  - type: FlashModifier
    modifier: 2
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Novakin
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#000000"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: TypingIndicator
    proto: alien
  - type: Fingerprint
  - type: Blindable
  - type: KrittersNightVision
  - type: AtmosExposed
  - type: PointLight
    enabled: true
    radius: 1.2
    energy: 1
    color: "#ffb36b"
  - type: Temperature
    currentTemperature: 373.15
    # A fueled Core can hold station temperature without EVA insulation.
    atmosTemperatureTransferEfficiency: 0.02
    # The Novakin shell system owns thermal damage and its separate warning alert.
    heatDamageThreshold: 1000000
    coldDamageThreshold: 1
    specificHeat: 42
  - type: ThermalRegulator
    metabolismHeat: 0
    radiatedHeat: 0
    # Exposed heat loss can overpower this regulation; insulated suits reduce that loss natively.
    implicitHeatRegulation: 2000
    sweatHeatRegulation: 2000
    shiveringHeatRegulation: 2000
    normalBodyTemperature: 373.15
    thermalRegulationTemperatureThreshold: 2
  - type: FireVisuals
    alternateState: Standing
  - type: LayingDown
  - type: ModifyUndies
  - type: RoleplayIncentive
