- type: reagent
  id: Cobaxalin
  name: reagent-name-cobaxalin
  group: Medicine
  desc: reagent-desc-cobaxalin
  physicalDesc: reagent-physical-desc-cloudy
  flavor: medicine
  color: "#908d60"
  metabolisms:
    Medicine:
      effects:
      - !type:HealthChange
        conditions:
        - !type:KrittersBloodType
          requiredTag: KrittersBloodBaseCobalt
        damage:
          types:
            Asphyxiation: -3.5
            Bloodloss: -3
      - !type:AdjustReagent
        conditions:
        - !type:KrittersBloodType
          requiredTag: KrittersBloodBaseCobalt
        - !type:ReagentThreshold
          reagent: HeartbreakerToxin
          min: 1
        reagent: HeartbreakerToxin
        amount: -3
      - !type:HealthChange
        conditions:
        - !type:KrittersBloodType
        - !type:ReagentThreshold
          min: 25
        damage:
          types:
            Asphyxiation: 5
      # Kritters: Tag-driven blood mistreatment. This only applies while the
      # Kritters blood type system has marked the patient active, so disabling
      # the system prevents non-cobalt entities from being matched.
      - !type:HealthChange
        conditions:
        - !type:KrittersBloodType
          requiredTag: KrittersBloodBaseCobalt
          invert: true
        damage:
          types:
            Poison: 1.0
            Asphyxiation: 2.5
            Bloodloss: 1
            Cellular: 1.0
