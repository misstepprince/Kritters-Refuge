      [head=2][color=#F9B34F]New Design: Edison Shipyard[/color][/head]
      [color=#E47A1F][italic]Servicing Ships since 2526[/italic][/color]

      The above station has been replaced by an all-new overhauled blueprint provided by the Chief Architect. They have worked alongside designers with Electra, former Edison Staff and Kritters Refuge Administration and the design is considered satisfactory for purpose.

      Below will be a list of key features, the location has been overhauled in order to provide more utility both to the onsite staff alongside visitors. Additionally, extensions have been made to fully accommodate and utilise a Supermatter crystal, the onsite qualified Supermatter technician S. Ilya PhD currently holds the licence for the site qualification.

      [head=3][color=#F9B34F][bold]The station has the following features:[/bold][/color][/head]
      [bullet] Renovated lobby area
      [bullet] Dynamic gas deposits (all docks marked 6 deposit to storage)
      [bullet] Miners for oxygen and nitrogen
      [bullet] Additional burn chambers for gas synthesis
      [bullet] Gas sale rate adjustment (now x1.5 market price)
      [bullet] Tesla and singularity containment (inspection pending)
      [bullet] Supermatter containment (crystal included)
      [bullet] Full ship drydock and equipment
      [bullet] Dedicated lathe to service ships from shift start


      [color=gray][italic]Electra Dynamics™ takes no responsibility for damage to person(s) during the operation of the Gravitational Singularity, use of PA systems above 3 voids building warranty. Supermatter crystal is not to be operated by non-qualified technicians, meson goggles required when in proximity to crystal. We hope you enjoy your investment. Electra Dynamics™ PLC Est. 2322, patent No. 523.[/italic]
