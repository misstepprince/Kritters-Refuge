- type: species
  id: Resomi
  name: species-name-resomi
  roundStart: true
  prototype: MobResomi
  sprites: MobResomiSprites
  defaultSkinTone: "#faf7f7"
  markingLimits: MobResomiMarkingLimits
  maleFirstNames: names_resomi_first
  femaleFirstNames: names_resomi_first
  lastNames: names_resomi_packs
  naming: FirstLast
  dollPrototype: AppearanceResomi
  skinColoration: Hues
  minAge: 23
  youngAge: 103
  oldAge: 257
  maxAge: 430
  # CS: custom name no workie :(
  # CS: Small enough to fit in a bag
  minHeight: 0.6
  defaultHeight: 0.8
  minWidth: 0.55
  defaultWidth: 0.8
  # End CS
  # CS: Need Kind for some reason
  kind:
    - BasicHumanlike
    - BasicFurry
  # End CS

- type: speciesBaseSprites
  id: MobResomiSprites
  sprites:
    Head: MobResomiHead
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    Hair: MobResomiHair
    Chest: MobResomiTorso
    Eyes: MobResomiEyes
    LArm: MobResomiLArm
    RArm: MobResomiRArm
    LHand: MobResomiLHand
    RHand: MobResomiRHand
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    LLeg: MobResomiLLeg
    RLeg: MobResomiRLeg
    LFoot: MobResomiLFoot
    RFoot: MobResomiRFoot
    Special: MobHumanoidAnyMarking
    Tail: MobHumanoidAnyMarking
    TailExtras: MobHumanoidAnyMarking
    # CS Start
    TailBehind: MobHumanoidAnyMarking
    TailOversuit: MobHumanoidAnyMarking
    FacialHair: MobHumanoidAnyMarking
    Snout: MobHumanoidAnyMarking
    Genital: MobHumanoidAnyMarking
    RArmExtension: MobHumanoidAnyMarking # Adds Wing Slot, this will look weird as fuck
    # End CS

- type: markingPoints
  id: MobResomiMarkingLimits
  onlyWhitelisted: true
  points:
    # CS: Unlimited markings because why not
    Tail:
      required: true
      points: 999
      defaultMarkings: [ ResomiTailFeathered ]

