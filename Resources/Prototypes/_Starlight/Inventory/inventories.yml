# Starlight - Base inventory entities for species
# Used by both Appearance and Mob entities to avoid duplication of displacement maps

- type: entity
  id: BaseInventoryAvali
  abstract: true
  components:
  - type: Inventory
    speciesId: avali
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: jumpsuit
      outerClothing:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: outerclothing
      shoes:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: shoes
      head:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: head
      hand:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: hand
      back:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: back
      gloves:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: gloves

